name: Unstable Test Reporter
on:
  schedule:
    # Run at UTC 04:00 daily (after Nightly at UTC 20:00 + buffer for completion)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Hours to look back for failed runs"
        required: false
        default: "28"

permissions:
  issues: write
  actions: read

jobs:
  report:
    name: "Report Unstable Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          use-policy-store: true
          api-key: ${{ secrets.GH_FRESHAENGINEERING_STEP_SECURITY_API_KEY }}

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run unstable test reporter
        run: python tools/ci/unstable_test_reporter.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '28' }}
