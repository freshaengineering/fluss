# .github/workflows/ci-template.yaml
name: CI Template

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string
      maven-parameters:
        description: "Any parameters of the Maven command."
        required: false
        type: string
        default: ""
jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        module: [ core, flink, spark3, spark3-scala213, lake ]
        include:
          - module: spark3-scala213
            scala-profile: "-Pscala-2.13"
            test-profile: "test-spark3"
    name: "${{ matrix.module }}"
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          use-policy-store: true
          api-key: ${{ secrets.GH_FRESHAENGINEERING_STEP_SECURITY_API_KEY }}

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - name: Build
        run: |
          mvn -T 1C -B clean install -DskipTests ${{ matrix.scala-profile }} ${{ inputs.maven-parameters }}
      - name: Test
        timeout-minutes: 60
        run: |
          TEST_MODULES=$(./.github/workflows/stage.sh ${{ matrix.module }})
          echo "github ref: ${{ github.ref }}"
          echo "Start testing modules: $TEST_MODULES"
          mvn -B verify $TEST_MODULES -Ptest-coverage -P${{ matrix.test-profile || format('test-{0}', matrix.module) }} ${{ matrix.scala-profile }} -Dlog.dir=${{ runner.temp }}/fluss-logs -Dlog4j.configurationFile=${{ github.workspace }}/tools/ci/log4j.properties ${{ inputs.maven-parameters }}
        env:
          MAVEN_OPTS: -Xmx4096m
          ARTIFACTS_OSS_ENDPOINT: ${{ secrets.ARTIFACTS_OSS_ENDPOINT }}
          ARTIFACTS_OSS_REGION: ${{ secrets.ARTIFACTS_OSS_REGION }}
          ARTIFACTS_OSS_BUCKET: ${{ secrets.ARTIFACTS_OSS_BUCKET }}
          ARTIFACTS_OSS_ACCESS_KEY: ${{ secrets.ARTIFACTS_OSS_ACCESS_KEY }}
          ARTIFACTS_OSS_SECRET_KEY: ${{ secrets.ARTIFACTS_OSS_SECRET_KEY }}
          ARTIFACTS_OSS_STS_ENDPOINT: ${{ secrets.ARTIFACTS_OSS_STS_ENDPOINT }}
          ARTIFACTS_OSS_ROLE_ARN: ${{ secrets.ARTIFACTS_OSS_ROLE_ARN }}
      - name: Upload build logs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: ${{ failure() }}
        with:
          name: logs-test-${{ matrix.module }}-${{ github.run_number}}#${{ github.run_attempt }}
          path: ${{ runner.temp }}/fluss-logs/*
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: ${{ success() && github.ref == 'refs/heads/main' }}
        with:
          name: jacoco-report-${{ matrix.module }}-${{ github.run_number}}#${{ github.run_attempt }}
          path: ${{ github.workspace }}/fluss-test-coverage/target/site/jacoco-aggregate/*